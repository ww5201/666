<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>视频网站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #fe2c55; --bg: #0f0f0f; --bg-card: #1a1a1a; --text: #fff; --text-sec: #aaa; --border: #333; }
        body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 60px; }
        /* Top Bar */
        .top-bar { position: fixed; top: 0; left: 0; right: 0; height: 50px; background: rgba(15,15,15,0.95); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 16px; z-index: 100; border-bottom: 1px solid var(--border); }
        .top-bar .logo { font-size: 20px; font-weight: bold; color: var(--primary); }
        .top-bar .search { flex: 1; margin: 0 12px; }
        .top-bar .search input { width: 100%; height: 36px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; padding: 0 14px; color: var(--text); font-size: 14px; outline: none; }
        .top-bar .search input:focus { border-color: var(--primary); }
        .upload-btn { background: var(--primary); color: #fff; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer; }
        /* Content */
        .content { margin-top: 50px; padding: 12px; }
        /* Category */
        .cats { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
        .cats::-webkit-scrollbar { display: none; }
        .cat { padding: 6px 14px; background: var(--bg-card); border-radius: 16px; font-size: 13px; white-space: nowrap; cursor: pointer; border: 1px solid var(--border); }
        .cat.active { background: var(--primary); border-color: var(--primary); }
        /* Video List */
        .video-list { display: flex; flex-direction: column; gap: 12px; }
        .video-item { background: var(--bg-card); border-radius: 10px; overflow: hidden; cursor: pointer; }
        .thumb { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
        .thumb img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .thumb .dur { position: absolute; bottom: 6px; right: 6px; background: rgba(0,0,0,0.8); padding: 2px 5px; border-radius: 3px; font-size: 11px; }
        .thumb .play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 44px; height: 44px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; opacity: 0; transition: opacity 0.2s; }
        .video-item:active .play-btn { opacity: 1; }
        .v-info { padding: 10px 12px; }
        .v-title { font-size: 14px; font-weight: 600; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .v-meta { display: flex; gap: 10px; margin-top: 6px; font-size: 12px; color: var(--text-sec); }
        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 56px; background: rgba(15,15,15,0.98); border-top: 1px solid var(--border); display: flex; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; font-size: 11px; color: var(--text-sec); cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item .icon { font-size: 22px; }
        /* Modal */
        .modal-bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .modal-bg.show { opacity: 1; pointer-events: all; }
        .modal { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-card); border-radius: 16px 16px 0 0; padding: 20px; z-index: 201; transform: translateY(100%); transition: transform 0.3s; max-height: 90vh; overflow-y: auto; }
        .modal-bg.show .modal { transform: translateY(0); }
        .modal h3 { font-size: 18px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
        .modal h3 .close { background: none; border: none; color: var(--text-sec); font-size: 24px; cursor: pointer; }
        .upload-area { border: 2px dashed var(--border); border-radius: 10px; padding: 30px; text-align: center; cursor: pointer; margin-bottom: 16px; }
        .upload-area .icon { font-size: 40px; margin-bottom: 8px; }
        .upload-area p { color: var(--text-sec); font-size: 13px; }
        .upload-area .file-name { margin-top: 8px; font-size: 12px; color: var(--primary); }
        .form-grp { margin-bottom: 14px; }
        .form-grp label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--text-sec); }
        .form-grp input, .form-grp textarea, .form-grp select { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; }
        .form-grp input:focus, .form-grp textarea:focus { border-color: var(--primary); }
        .form-grp textarea { resize: none; height: 60px; }
        .submit-btn { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 20px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .progress { display: none; margin: 12px 0; }
        .progress .bar { height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; }
        .progress .bar .fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
        .progress .txt { text-align: center; font-size: 12px; color: var(--text-sec); margin-top: 4px; }
        /* Player Page */
        .player-page { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 300; display: none; flex-direction: column; }
        .player-page.show { display: flex; }
        .player-top { height: 50px; display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid var(--border); }
        .player-top .back { font-size: 14px; color: var(--text-sec); cursor: pointer; background: none; border: none; }
        .player-vid { width: 100%; aspect-ratio: 16/9; background: #000; }
        .player-vid video { width: 100%; height: 100%; }
        .player-detail { flex: 1; overflow-y: auto; padding: 16px; }
        .player-detail h2 { font-size: 18px; margin-bottom: 10px; }
        .player-detail .meta { display: flex; gap: 12px; color: var(--text-sec); font-size: 13px; margin-bottom: 12px; flex-wrap: wrap; }
        .player-detail .actions { display: flex; gap: 10px; margin-bottom: 16px; }
        .player-detail .actions button { flex: 1; padding: 10px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; cursor: pointer; }
        .player-detail .actions button:active { background: var(--primary); }
        .player-detail .desc { padding: 12px; background: var(--bg-card); border-radius: 8px; color: var(--text-sec); font-size: 13px; line-height: 1.6; }
        /* Empty */
        .empty { text-align: center; padding: 60px 20px; }
        .empty .icon { font-size: 48px; margin-bottom: 12px; }
        .empty h3 { margin-bottom: 6px; }
        .empty p { color: var(--text-sec); font-size: 14px; margin-bottom: 16px; }
        .empty .btn { padding: 10px 24px; background: var(--primary); color: #fff; border: none; border-radius: 20px; font-size: 14px; cursor: pointer; }
        /* Toast */
        .toast-box { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); z-index: 500; }
        .toast { padding: 10px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; animation: fadeIn 0.3s; margin-bottom: 8px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="top-bar">
        <span class="logo">🎬</span>
        <div class="search">
            <input type="text" id="sInput" placeholder="搜索视频..." onkeyup="if(event.key==='Enter')doSearch()">
        </div>
        <button class="upload-btn" onclick="openUpload()">+</button>
    </div>

    <div class="content" id="homeContent">
        <div class="cats" id="catBar">
            <div class="cat active" onclick="filterCat('')">全部</div>
            <div class="cat" onclick="filterCat('娱乐')">娱乐</div>
            <div class="cat" onclick="filterCat('科技')">科技</div>
            <div class="cat" onclick="filterCat('音乐')">音乐</div>
            <div class="cat" onclick="filterCat('游戏')">游戏</div>
            <div class="cat" onclick="filterCat('教育')">教育</div>
            <div class="cat" onclick="filterCat('生活')">生活</div>
        </div>
        <div class="video-list" id="videoList"></div>
        <div id="emptyBox" class="empty" style="display:none">
            <div class="icon">🎬</div>
            <h3>还没有视频</h3>
            <p>上传你的第一个视频吧</p>
            <button class="btn" onclick="openUpload()">上传视频</button>
        </div>
    </div>

    <!-- Player -->
    <div class="player-page" id="playerPage">
        <div class="player-top">
            <button class="back" onclick="closePlayer()">← 返回</button>
        </div>
        <div class="player-vid"><video id="mPlayer" controls playsinline></video></div>
        <div class="player-detail">
            <h2 id="pTitle"></h2>
            <div class="meta">
                <span id="pViews"></span><span id="pDate"></span><span id="pCat"></span><span id="pSize"></span>
            </div>
            <div class="actions">
                <button onclick="likeVideo()">👍 点赞</button>
                <button onclick="dlVideo()">⬇️ 下载</button>
                <button onclick="delVideo()" style="color:var(--primary)">🗑️ 删除</button>
            </div>
            <div class="desc" id="pDesc"></div>
        </div>
    </div>

    <!-- Upload Modal -->
    <div class="modal-bg" id="uploadModal">
        <div class="modal">
            <h3>上传视频 <button class="close" onclick="closeUpload()">&times;</button></h3>
            <div class="upload-area" onclick="document.getElementById('mFile').click()">
                <div class="icon">📁</div>
                <p>点击选择视频文件</p>
                <div class="file-name" id="fName" style="display:none"></div>
                <input type="file" id="mFile" accept="video/*" style="display:none" onchange="onFile(this)">
            </div>
            <div class="progress" id="prog">
                <div class="bar"><div class="fill" id="progFill"></div></div>
                <div class="txt" id="progTxt">准备中...</div>
            </div>
            <div class="form-grp"><label>标题 *</label><input type="text" id="vTitle" placeholder="视频标题"></div>
            <div class="form-grp"><label>描述</label><textarea id="vDesc" placeholder="视频描述"></textarea></div>
            <div class="form-grp"><label>分类</label>
                <select id="vCat"><option value="娱乐">娱乐</option><option value="科技">科技</option><option value="音乐">音乐</option><option value="游戏">游戏</option><option value="教育">教育</option><option value="生活">生活</option><option value="其他">其他</option></select>
            </div>
            <button class="submit-btn" onclick="doUpload()">发布视频</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="filterCat('')"><span class="icon">🏠</span>首页</div>
        <div class="nav-item" onclick="openUpload()"><span class="icon">➕</span>上传</div>
        <div class="nav-item" onclick="clearAll()"><span class="icon">🗑️</span>清空</div>
    </div>

    <div class="toast-box" id="toastBox"></div>

    <script>
    const DB='VideoDB', VER=1, STORE='videos';
    let db=null, vids=[], curCat='', curSearch='', curId=null, selFile=null;

    function openDB(){return new Promise((r,j)=>{const q=indexedDB.open(DB,VER);q.onerror=()=>j(q.error);q.onsuccess=()=>{db=q.result;r(db)};q.onupgradeneeded=e=>{if(!e.target.result.objectStoreNames.contains(STORE)){e.target.result.createObjectStore(STORE,{keyPath:'id'})}}})}
    function dbAll(){return new Promise((r,j)=>{const tx=db.transaction(STORE,'readonly');const q=tx.objectStore(STORE).getAll();q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
    function dbPut(v){return new Promise((r,j)=>{const tx=db.transaction(STORE,'readwrite');const q=tx.objectStore(STORE).put(v);q.onsuccess=()=>r();q.onerror=()=>j(q.error)})}
    function dbDel(id){return new Promise((r,j)=>{const tx=db.transaction(STORE,'readwrite');const q=tx.objectStore(STORE).delete(id);q.onsuccess=()=>r();q.onerror=()=>j(q.error)})}
    function dbClr(){return new Promise((r,j)=>{const tx=db.transaction(STORE,'readwrite');const q=tx.objectStore(STORE).clear();q.onsuccess=()=>r();q.onerror=()=>j(q.error)})}

    function gid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,9)}
    function fmtDur(s){if(!s||isNaN(s))return'00:00';const h=Math.floor(s/3600),m=Math.floor(s%3600/60),sec=Math.floor(s%60);return h>0?h+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0'):String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')}
    function fmtSz(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';if(b<1073741824)return(b/1048576).toFixed(1)+'MB';return(b/1073741824).toFixed(2)+'GB'}
    function fmtDate(d){const diff=Date.now()-new Date(d);if(diff<60000)return'刚刚';if(diff<3600000)return Math.floor(diff/60000)+'分钟前';if(diff<86400000)return Math.floor(diff/3600000)+'小时前';return new Date(d).toLocaleDateString('zh-CN')}
    function catIcon(c){return{'娱乐':'😄','科技':'💻','音乐':'🎵','游戏':'🎮','教育':'📚','生活':'🌟','其他':'📌'}[c]||'📌'}
    function toast(m,t='s'){const b=document.getElementById('toastBox');const d=document.createElement('div');d.className='toast';d.textContent=(t==='s'?'✅':'❌')+' '+m;b.appendChild(d);setTimeout(()=>d.remove(),3000)}

    function mkThumb(file){return new Promise(r=>{const v=document.createElement('video');v.preload='metadata';v.muted=1;v.src=URL.createObjectURL(file);v.onloadeddata=()=>{v.currentTime=Math.min(1,v.duration*.1)};v.onseeked=()=>{const c=document.createElement('canvas');c.width=320;c.height=180;c.getContext('2d').drawImage(v,0,0,320,180);const t=c.toDataURL('image/jpeg',.7);URL.revokeObjectURL(v.src);r(t)};v.onerror=()=>{URL.revokeObjectURL(v.src);r(null)};setTimeout(()=>{URL.revokeObjectURL(v.src);r(null)},5000)})}
    function mkDur(file){return new Promise(r=>{const v=document.createElement('video');v.preload='metadata';v.src=URL.createObjectURL(file);v.onloadedmetadata=()=>{URL.revokeObjectURL(v.src);r(v.duration)};v.onerror=()=>{URL.revokeObjectURL(v.src);r(0)}})}

    function openUpload(){document.getElementById('uploadModal').classList.add('show');selFile=null;document.getElementById('fName').style.display='none';document.getElementById('vTitle').value='';document.getElementById('vDesc').value='';document.getElementById('prog').style.display='none'}
    function closeUpload(){document.getElementById('uploadModal').classList.remove('show')}
    function onFile(inp){const f=inp.files[0];if(!f)return;if(!f.type.startsWith('video/')){toast('请选择视频文件','e');return}selFile=f;const n=document.getElementById('fName');n.style.display='block';n.textContent='📹 '+f.name+' ('+fmtSz(f.size)+')';if(!document.getElementById('vTitle').value)document.getElementById('vTitle').value=f.name.replace(/\.[^/.]+$/,'')}

    async function doUpload(){
        if(!selFile){toast('请先选择视频','e');return}
        const title=document.getElementById('vTitle').value.trim();
        if(!title){toast('请输入标题','e');return}
        const p=document.getElementById('prog'),pf=document.getElementById('progFill'),pt=document.getElementById('progTxt');
        p.style.display='block';
        try{
            pt.textContent='生成缩略图...';pf.style.width='20%';const thumb=await mkThumb(selFile);
            pt.textContent='获取信息...';pf.style.width='40%';const dur=await mkDur(selFile);
            pt.textContent='读取数据...';pf.style.width='60%';const buf=await selFile.arrayBuffer();
            pt.textContent='保存中...';pf.style.width='80%';
            await dbPut({id:gid(),title,description:document.getElementById('vDesc').value.trim(),category:document.getElementById('vCat').value,fileName:selFile.name,fileSize:selFile.size,fileType:selFile.type,duration:dur,thumbnail:thumb,data:buf,views:0,likes:0,uploadDate:new Date().toISOString()});
            pf.style.width='100%';pt.textContent='完成！';toast('发布成功');closeUpload();loadVids();
        }catch(e){toast('上传失败','e');p.style.display='none'}
    }

    async function loadVids(){vids=await dbAll();vids.sort((a,b)=>new Date(b.uploadDate)-new Date(a.uploadDate));render()}
    function render(){
        let f=vids;
        if(curCat)f=f.filter(v=>v.category===curCat);
        if(curSearch){const q=curSearch.toLowerCase();f=f.filter(v=>v.title.toLowerCase().includes(q)||(v.description&&v.description.toLowerCase().includes(q)))}
        const list=document.getElementById('videoList'),empty=document.getElementById('emptyBox');
        if(!f.length){list.innerHTML='';empty.style.display='block';return}
        empty.style.display='none';
        list.innerHTML=f.map(v=>`<div class="video-item" onclick="playV('${v.id}')"><div class="thumb">${v.thumbnail?'<img src="'+v.thumbnail+'">':'<div style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#1a1a1a;font-size:40px">🎬</div>'}<span class="dur">${fmtDur(v.duration)}</span><span class="play-btn">▶</span></div><div class="v-info"><div class="v-title">${v.title}</div><div class="v-meta"><span>👁${v.views||0}</span><span>👍${v.likes||0}</span><span>${fmtDate(v.uploadDate)}</span></div></div></div>`).join('')
    }

    function filterCat(c){curCat=c;document.querySelectorAll('.cat').forEach(x=>x.classList.toggle('active',x.textContent.includes(c)||(!c&&x.textContent==='全部')));render()}
    function doSearch(){curSearch=document.getElementById('sInput').value.trim();render()}

    async function playV(id){
        const v=vids.find(x=>x.id===id);if(!v)return;curId=id;v.views=(v.views||0)+1;await dbPut(v);
        const url=URL.createObjectURL(new Blob([v.data],{type:v.fileType}));
        const p=document.getElementById('mPlayer');p.src=url;p.load();
        document.getElementById('pTitle').textContent=v.title;
        document.getElementById('pViews').textContent=v.views+' 次播放';
        document.getElementById('pDate').textContent=fmtDate(v.uploadDate);
        document.getElementById('pCat').textContent=catIcon(v.category)+' '+v.category;
        document.getElementById('pSize').textContent=fmtSz(v.fileSize);
        document.getElementById('pDesc').textContent=v.description||'暂无描述';
        document.getElementById('playerPage').classList.add('show');
        try{await p.play()}catch(e){}
    }
    function closePlayer(){document.getElementById('playerPage').classList.remove('show');const p=document.getElementById('mPlayer');p.pause();if(p.src)URL.revokeObjectURL(p.src);p.src='';curId=null}

    async function likeVideo(){if(!curId)return;const v=vids.find(x=>x.id===curId);if(!v)return;v.likes=(v.likes||0)+1;await dbPut(v);toast('已点赞');loadVids()}
    function dlVideo(){if(!curId)return;const v=vids.find(x=>x.id===curId);if(!v)return;const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([v.data],{type:v.fileType}));a.download=v.fileName||'video.mp4';a.click();toast('下载中')}
    async function delVideo(){if(!curId)return;if(!confirm('确定删除？'))return;await dbDel(curId);toast('已删除');closePlayer();loadVids()}
    async function clearAll(){if(!vids.length)return;if(!confirm('删除全部 '+vids.length+' 个视频？'))return;await dbClr();toast('已清空');loadVids()}

    (async()=>{await openDB();await loadVids()})();
    </script>
</body>
</html>
