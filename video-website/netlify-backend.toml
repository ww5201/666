[build]
  command = "cd backend && npm install && npm run build"
  publish = "backend"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/backend/server-simple.js"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/backend/server-simple.js"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin-backend.html"
  status = 200

[[redirects]]
  from = "/test"
  to = "/backend-test.html"
  status = 200

[[redirects]]
  from = "/docs"
  to = "/api-documentation.html"
  status = 200

[dev]
  command = "cd backend && npm run dev"
  port = 3000
  publish = "backend"