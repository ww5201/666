<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频网站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #fe2c55;
            --primary-dark: #e0264c;
            --bg: #0f0f0f;
            --bg-card: #1a1a1a;
            --bg-hover: #252525;
            --text: #fff;
            --text-secondary: #aaa;
            --border: #333;
            --success: #00c853;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* Header */
        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 60px;
            background: rgba(15,15,15,0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 24px; z-index: 1000;
        }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .search-bar { flex: 1; max-width: 500px; margin: 0 24px; display: flex; }
        .search-bar input {
            flex: 1; height: 40px; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: 20px 0 0 20px;
            padding: 0 16px; color: var(--text); font-size: 14px; outline: none;
        }
        .search-bar input:focus { border-color: var(--primary); }
        .search-bar button {
            width: 60px; height: 40px; background: var(--bg-hover);
            border: 1px solid var(--border); border-left: none;
            border-radius: 0 20px 20px 0; color: var(--text); cursor: pointer; font-size: 18px;
        }
        .search-bar button:hover { background: var(--primary); }
        .header-actions { display: flex; gap: 12px; margin-left: auto; }
        .btn {
            padding: 8px 20px; border-radius: 20px; border: none;
            cursor: pointer; font-size: 14px; font-weight: 600;
            transition: all 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: scale(1.02); }
        .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn-outline:hover { border-color: var(--text); }
        /* Sidebar */
        .sidebar {
            position: fixed; left: 0; top: 60px; bottom: 0; width: 220px;
            background: var(--bg); border-right: 1px solid var(--border);
            padding: 16px 0; overflow-y: auto; z-index: 900;
        }
        .sidebar-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 24px; cursor: pointer; transition: background 0.2s;
            color: var(--text-secondary); font-size: 15px;
        }
        .sidebar-item:hover, .sidebar-item.active { background: var(--bg-hover); color: var(--text); }
        .sidebar-item.active { color: var(--primary); font-weight: 600; }
        .sidebar-item .icon { font-size: 20px; width: 24px; text-align: center; }
        .sidebar-divider { height: 1px; background: var(--border); margin: 12px 0; }
        .sidebar-title { padding: 8px 24px; font-size: 13px; color: var(--text-secondary); text-transform: uppercase; }
        /* Main */
        .main { margin-left: 220px; margin-top: 60px; padding: 24px; min-height: calc(100vh - 60px); }
        /* Category Bar */
        .category-bar { display: flex; gap: 10px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
        .category-bar::-webkit-scrollbar { display: none; }
        .category-chip {
            padding: 8px 18px; background: var(--bg-card); border-radius: 20px;
            cursor: pointer; white-space: nowrap; font-size: 14px;
            transition: all 0.2s; border: 1px solid var(--border);
        }
        .category-chip:hover, .category-chip.active { background: var(--primary); border-color: var(--primary); }
        /* Video Grid */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .video-card { background: var(--bg-card); border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .video-card:hover { transform: translateY(-4px); }
        .video-thumbnail { position: relative; width: 100%; padding-top: 56.25%; background: #000; overflow: hidden; }
        .video-thumbnail img, .video-thumbnail video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
        }
        .video-thumbnail .duration {
            position: absolute; bottom: 8px; right: 8px;
            background: rgba(0,0,0,0.8); color: white;
            padding: 2px 6px; border-radius: 4px; font-size: 12px;
        }
        .video-thumbnail .play-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.2s;
        }
        .video-card:hover .play-overlay { opacity: 1; }
        .play-overlay .play-icon {
            width: 50px; height: 50px; background: var(--primary);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 24px;
        }
        .video-info { padding: 12px 16px; }
        .video-title {
            font-size: 15px; font-weight: 600; line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .video-meta { display: flex; gap: 12px; margin-top: 8px; font-size: 13px; color: var(--text-secondary); }
        .video-category-tag {
            display: inline-block; padding: 2px 8px;
            background: rgba(254,44,85,0.15); color: var(--primary);
            border-radius: 4px; font-size: 12px; margin-top: 6px;
        }
        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: all; }
        .modal {
            background: var(--bg-card); border-radius: 16px;
            width: 90%; max-width: 600px; max-height: 90vh;
            overflow-y: auto; padding: 32px;
        }
        .modal h2 { font-size: 22px; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
        .modal h2 .close-modal { margin-left: auto; background: none; border: none; color: var(--text-secondary); font-size: 28px; cursor: pointer; }
        .modal h2 .close-modal:hover { color: var(--text); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-secondary); }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 12px 16px; background: var(--bg);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); font-size: 14px; outline: none;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--primary); }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .upload-zone {
            border: 2px dashed var(--border); border-radius: 12px;
            padding: 40px; text-align: center; cursor: pointer; transition: border-color 0.2s;
        }
        .upload-zone:hover, .upload-zone.dragover { border-color: var(--primary); }
        .upload-zone .icon { font-size: 48px; margin-bottom: 12px; }
        .upload-zone p { color: var(--text-secondary); }
        .upload-zone .file-info { margin-top: 12px; padding: 10px; background: var(--bg); border-radius: 8px; font-size: 13px; }
        .upload-progress { display: none; margin-top: 16px; }
        .progress-bar { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
        .progress-bar .fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.3s; width: 0%; }
        .progress-text { text-align: center; margin-top: 8px; font-size: 13px; color: var(--text-secondary); }
        /* Player */
        .player-page { display: none; }
        .player-page.show { display: block; }
        .player-container { max-width: 1000px; margin: 0 auto; }
        .player-video { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
        .player-video video { width: 100%; height: 100%; }
        .player-info { padding: 20px 0; }
        .player-title { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
        .player-meta { display: flex; gap: 16px; color: var(--text-secondary); font-size: 14px; margin-bottom: 16px; flex-wrap: wrap; }
        .player-desc { padding: 16px; background: var(--bg-card); border-radius: 12px; line-height: 1.6; color: var(--text-secondary); }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; color: var(--text-secondary); cursor: pointer; margin-bottom: 16px; font-size: 14px; }
        .back-btn:hover { color: var(--text); }
        .player-actions { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .player-actions .btn { font-size: 13px; padding: 8px 16px; }
        /* Empty State */
        .empty-state { text-align: center; padding: 80px 20px; }
        .empty-state .icon { font-size: 64px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 20px; margin-bottom: 8px; }
        .empty-state p { color: var(--text-secondary); margin-bottom: 20px; }
        /* Stats */
        .stats-bar { display: flex; gap: 24px; padding: 16px 0; margin-bottom: 20px; }
        .stat-item { font-size: 14px; color: var(--text-secondary); }
        .stat-item strong { color: var(--text); font-size: 20px; }
        /* Toast */
        .toast-container { position: fixed; top: 80px; right: 24px; z-index: 3000; display: flex; flex-direction: column; gap: 8px; }
        .toast {
            padding: 12px 20px; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 8px; font-size: 14px; animation: slideIn 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--primary); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
            .search-bar { margin: 0 12px; }
            .header-actions .btn span { display: none; }
            .video-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
            .modal { padding: 20px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo" onclick="showHome()">🎬 <span>视频网站</span></div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="搜索视频..." onkeyup="if(event.key==='Enter')searchVideos()">
            <button onclick="searchVideos()">🔍</button>
        </div>
        <div class="header-actions">
            <button class="btn btn-primary" onclick="openUpload()">📤 <span>上传视频</span></button>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-item active" onclick="showHome();filterCategory('')" data-page="home">
            <span class="icon">🏠</span> 推荐
        </div>
        <div class="sidebar-item" onclick="filterCategory('')">
            <span class="icon">📺</span> 全部视频
        </div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-title">分类</div>
        <div class="sidebar-item" onclick="filterCategory('娱乐')"><span class="icon">😄</span> 娱乐</div>
        <div class="sidebar-item" onclick="filterCategory('科技')"><span class="icon">💻</span> 科技</div>
        <div class="sidebar-item" onclick="filterCategory('音乐')"><span class="icon">🎵</span> 音乐</div>
        <div class="sidebar-item" onclick="filterCategory('游戏')"><span class="icon">🎮</span> 游戏</div>
        <div class="sidebar-item" onclick="filterCategory('教育')"><span class="icon">📚</span> 教育</div>
        <div class="sidebar-item" onclick="filterCategory('生活')"><span class="icon">🌟</span> 生活</div>
        <div class="sidebar-item" onclick="filterCategory('其他')"><span class="icon">📌</span> 其他</div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-title">管理</div>
        <div class="sidebar-item" onclick="showMyVideos()"><span class="icon">📁</span> 我的视频</div>
        <div class="sidebar-item" onclick="clearAllVideos()"><span class="icon">🗑️</span> 清空全部</div>
    </div>

    <!-- Main Content -->
    <div class="main">
        <!-- Home Page -->
        <div id="homePage">
            <div class="category-bar">
                <div class="category-chip active" onclick="filterCategory('')">全部</div>
                <div class="category-chip" onclick="filterCategory('娱乐')">😄 娱乐</div>
                <div class="category-chip" onclick="filterCategory('科技')">💻 科技</div>
                <div class="category-chip" onclick="filterCategory('音乐')">🎵 音乐</div>
                <div class="category-chip" onclick="filterCategory('游戏')">🎮 游戏</div>
                <div class="category-chip" onclick="filterCategory('教育')">📚 教育</div>
                <div class="category-chip" onclick="filterCategory('生活')">🌟 生活</div>
                <div class="category-chip" onclick="filterCategory('其他')">📌 其他</div>
            </div>
            <div class="stats-bar">
                <div class="stat-item">视频 <strong id="totalVideos">0</strong></div>
                <div class="stat-item">总时长 <strong id="totalDuration">0分</strong></div>
                <div class="stat-item">总大小 <strong id="totalSize">0 MB</strong></div>
            </div>
            <div id="videoGrid" class="video-grid"></div>
            <div id="emptyState" class="empty-state" style="display:none">
                <div class="icon">🎬</div>
                <h3>还没有视频</h3>
                <p>上传您的第一个视频，开始创作之旅</p>
                <button class="btn btn-primary" onclick="openUpload()">📤 上传视频</button>
            </div>
        </div>

        <!-- Player Page -->
        <div id="playerPage" class="player-page">
            <div class="player-container">
                <div class="back-btn" onclick="showHome()">← 返回</div>
                <div class="player-video">
                    <video id="videoPlayer" controls></video>
                </div>
                <div class="player-info">
                    <h1 class="player-title" id="playerTitle"></h1>
                    <div class="player-meta">
                        <span id="playerViews">0 次播放</span>
                        <span id="playerDate"></span>
                        <span id="playerCategory"></span>
                        <span id="playerSize"></span>
                    </div>
                    <div class="player-actions">
                        <button class="btn btn-outline" onclick="likeCurrentVideo()">👍 赞</button>
                        <button class="btn btn-outline" onclick="downloadCurrentVideo()">⬇️ 下载</button>
                        <button class="btn btn-outline" style="border-color:var(--primary);color:var(--primary)" onclick="deleteCurrentVideo()">🗑️ 删除</button>
                    </div>
                    <div class="player-desc" id="playerDesc"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Upload Modal -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal">
            <h2>📤 上传视频 <button class="close-modal" onclick="closeUpload()">&times;</button></h2>
            <div class="upload-zone" id="uploadZone" onclick="document.getElementById('videoFile').click()">
                <div class="icon">📁</div>
                <p>点击或拖拽视频文件到这里</p>
                <p style="font-size:12px;margin-top:8px">支持 MP4、WebM、OGG 等视频格式</p>
                <div class="file-info" id="fileInfo" style="display:none"></div>
                <input type="file" id="videoFile" accept="video/*" style="display:none" onchange="handleFileSelect(this)">
            </div>
            <div class="upload-progress" id="uploadProgress">
                <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
                <div class="progress-text" id="progressText">准备上传...</div>
            </div>
            <div class="form-group">
                <label>视频标题 *</label>
                <input type="text" id="videoTitle" placeholder="给视频起个标题">
            </div>
            <div class="form-group">
                <label>视频描述</label>
                <textarea id="videoDesc" placeholder="描述一下你的视频"></textarea>
            </div>
            <div class="form-group">
                <label>视频分类</label>
                <select id="videoCategory">
                    <option value="娱乐">😄 娱乐</option>
                    <option value="科技">💻 科技</option>
                    <option value="音乐">🎵 音乐</option>
                    <option value="游戏">🎮 游戏</option>
                    <option value="教育">📚 教育</option>
                    <option value="生活">🌟 生活</option>
                    <option value="其他">📌 其他</option>
                </select>
            </div>
            <button class="btn btn-primary" style="width:100%;justify-content:center;padding:14px" onclick="uploadVideo()">🚀 发布视频</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
    // ==================== IndexedDB ====================
    const DB_NAME = 'VideoWebsiteDB';
    const DB_VERSION = 1;
    const STORE_NAME = 'videos';
    let db = null;
    let currentVideoId = null;

    function openDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, DB_VERSION);
            req.onerror = () => reject(req.error);
            req.onsuccess = () => { db = req.result; resolve(db); };
            req.onupgradeneeded = (e) => {
                const d = e.target.result;
                if (!d.objectStoreNames.contains(STORE_NAME)) {
                    const s = d.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    s.createIndex('category', 'category', { unique: false });
                    s.createIndex('uploadDate', 'uploadDate', { unique: false });
                }
            };
        });
    }
    function dbGetAll() {
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readonly');
            const req = tx.objectStore(STORE_NAME).getAll();
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }
    function dbPut(video) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const req = tx.objectStore(STORE_NAME).put(video);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }
    function dbDelete(id) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const req = tx.objectStore(STORE_NAME).delete(id);
            req.onsuccess = () => resolve();
            req.onerror = () => reject(req.error);
        });
    }
    function dbClear() {
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const req = tx.objectStore(STORE_NAME).clear();
            req.onsuccess = () => resolve();
            req.onerror = () => reject(req.error);
        });
    }

    // ==================== 工具 ====================
    function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 9); }
    function formatDuration(s) {
        if (!s || isNaN(s)) return '00:00';
        const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60);
        if (h > 0) return h+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
        return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
    }
    function formatSize(b) {
        if (b < 1024) return b+' B';
        if (b < 1048576) return (b/1024).toFixed(1)+' KB';
        if (b < 1073741824) return (b/1048576).toFixed(1)+' MB';
        return (b/1073741824).toFixed(2)+' GB';
    }
    function formatDate(d) {
        const date = new Date(d), now = new Date(), diff = now - date;
        if (diff < 60000) return '刚刚';
        if (diff < 3600000) return Math.floor(diff/60000)+' 分钟前';
        if (diff < 86400000) return Math.floor(diff/3600000)+' 小时前';
        if (diff < 2592000000) return Math.floor(diff/86400000)+' 天前';
        return date.toLocaleDateString('zh-CN');
    }
    function showToast(msg, type='success') {
        const c = document.getElementById('toastContainer');
        const t = document.createElement('div');
        t.className = 'toast ' + type;
        t.innerHTML = (type==='success'?'✅':'❌') + ' ' + msg;
        c.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }
    function getCategoryIcon(c) {
        return {'娱乐':'😄','科技':'💻','音乐':'🎵','游戏':'🎮','教育':'📚','生活':'🌟','其他':'📌'}[c] || '📌';
    }

    // ==================== 缩略图 ====================
    function generateThumbnail(file) {
        return new Promise((resolve) => {
            const v = document.createElement('video');
            v.preload = 'metadata'; v.muted = true; v.playsInline = true;
            v.src = URL.createObjectURL(file);
            v.onloadeddata = () => { v.currentTime = Math.min(1, v.duration * 0.1); };
            v.onseeked = () => {
                const c = document.createElement('canvas');
                c.width = 320; c.height = 180;
                c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
                const thumb = c.toDataURL('image/jpeg', 0.7);
                URL.revokeObjectURL(v.src);
                resolve(thumb);
            };
            v.onerror = () => { URL.revokeObjectURL(v.src); resolve(null); };
            setTimeout(() => { URL.revokeObjectURL(v.src); resolve(null); }, 5000);
        });
    }
    function getVideoDuration(file) {
        return new Promise((resolve) => {
            const v = document.createElement('video');
            v.preload = 'metadata'; v.src = URL.createObjectURL(file);
            v.onloadedmetadata = () => { URL.revokeObjectURL(v.src); resolve(v.duration); };
            v.onerror = () => { URL.revokeObjectURL(v.src); resolve(0); };
        });
    }

    // ==================== 上传 ====================
    let selectedFile = null;
    function openUpload() {
        document.getElementById('uploadModal').classList.add('show');
        selectedFile = null;
        document.getElementById('fileInfo').style.display = 'none';
        document.getElementById('videoTitle').value = '';
        document.getElementById('videoDesc').value = '';
        document.getElementById('uploadProgress').style.display = 'none';
        document.getElementById('progressFill').style.width = '0%';
    }
    function closeUpload() { document.getElementById('uploadModal').classList.remove('show'); selectedFile = null; }

    function handleFileSelect(input) {
        const file = input.files[0];
        if (!file) return;
        if (!file.type.startsWith('video/')) { showToast('请选择视频文件（MP4/WebM/OGG）', 'error'); return; }
        // 500MB 限制
        if (file.size > 500 * 1024 * 1024) { showToast('视频文件不能超过500MB', 'error'); input.value = ''; return; }
        selectedFile = file;
        const info = document.getElementById('fileInfo');
        info.style.display = 'block';
        info.innerHTML = '📹 ' + file.name + ' (' + formatSize(file.size) + ')';
        if (!document.getElementById('videoTitle').value) {
            document.getElementById('videoTitle').value = file.name.replace(/\.[^/.]+$/, '');
        }
        showToast('已选择: ' + file.name);
    }

    const uploadZone = document.getElementById('uploadZone');
    uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', (e) => {
        e.preventDefault(); uploadZone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('video/')) {
            selectedFile = file;
            const info = document.getElementById('fileInfo');
            info.style.display = 'block';
            info.innerHTML = '📹 ' + file.name + ' (' + formatSize(file.size) + ')';
            if (!document.getElementById('videoTitle').value) {
                document.getElementById('videoTitle').value = file.name.replace(/\.[^/.]+$/, '');
            }
        } else { showToast('请选择视频文件', 'error'); }
    });

    async function uploadVideo() {
        if (!selectedFile) { showToast('请先选择视频文件', 'error'); return; }
        const title = document.getElementById('videoTitle').value.trim();
        if (!title) { showToast('请输入视频标题', 'error'); return; }

        const btn = document.querySelector('.modal .btn-primary');
        const origText = btn.innerHTML;
        btn.innerHTML = '⏳ 处理中...'; btn.disabled = true;

        const pDiv = document.getElementById('uploadProgress');
        const pFill = document.getElementById('progressFill');
        const pText = document.getElementById('progressText');
        pDiv.style.display = 'block';

        try {
            pText.textContent = '生成缩略图...'; pFill.style.width = '10%';
            const thumbnail = await generateThumbnail(selectedFile);

            pText.textContent = '获取视频时长...'; pFill.style.width = '25%';
            const duration = await getVideoDuration(selectedFile);

            pText.textContent = '读取视频数据（' + formatSize(selectedFile.size) + '）...'; pFill.style.width = '40%';
            const arrayBuffer = await selectedFile.arrayBuffer();

            pText.textContent = '写入本地数据库...'; pFill.style.width = '70%';
            const video = {
                id: generateId(), title: title,
                description: document.getElementById('videoDesc').value.trim(),
                category: document.getElementById('videoCategory').value,
                fileName: selectedFile.name, fileSize: selectedFile.size,
                fileType: selectedFile.type, duration: duration,
                thumbnail: thumbnail, data: arrayBuffer,
                views: 0, likes: 0, uploadDate: new Date().toISOString()
            };
            await dbPut(video);

            pFill.style.width = '100%'; pText.textContent = '✅ 发布成功！';
            showToast('🎉 视频发布成功！');
            setTimeout(() => { closeUpload(); loadVideos(); }, 800);
        } catch (err) {
            console.error('Upload error:', err);
            let msg = '上传失败';
            if (err.name === 'QuotaExceededError') {
                msg = '存储空间不足，请删除一些视频后重试';
            } else if (err.message) {
                msg = '上传失败: ' + err.message;
            }
            showToast(msg, 'error');
            pDiv.style.display = 'none';
        } finally {
            btn.innerHTML = origText; btn.disabled = false;
        }
    }

    // ==================== 视频列表 ====================
    let allVideos = [];
    let currentCategory = '';
    let currentSearch = '';

    async function loadVideos() {
        allVideos = await dbGetAll();
        allVideos.sort((a, b) => new Date(b.uploadDate) - new Date(a.uploadDate));
        renderVideos(); updateStats();
    }

    function renderVideos() {
        let filtered = allVideos;
        if (currentCategory) filtered = filtered.filter(v => v.category === currentCategory);
        if (currentSearch) {
            const q = currentSearch.toLowerCase();
            filtered = filtered.filter(v => v.title.toLowerCase().includes(q) || (v.description && v.description.toLowerCase().includes(q)));
        }
        const grid = document.getElementById('videoGrid');
        const empty = document.getElementById('emptyState');
        if (filtered.length === 0) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
        empty.style.display = 'none';
        grid.innerHTML = filtered.map(v => `
            <div class="video-card" onclick="playVideo('${v.id}')">
                <div class="video-thumbnail">
                    ${v.thumbnail ? '<img src="'+v.thumbnail+'" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover">' : '<div style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#1a1a1a;font-size:48px">🎬</div>'}
                    <span class="duration">${formatDuration(v.duration)}</span>
                    <div class="play-overlay"><div class="play-icon">▶</div></div>
                </div>
                <div class="video-info">
                    <div class="video-title">${v.title}</div>
                    <div class="video-meta">
                        <span>👁️ ${v.views||0}</span><span>👍 ${v.likes||0}</span><span>${formatDate(v.uploadDate)}</span>
                    </div>
                    <div class="video-category-tag">${getCategoryIcon(v.category)} ${v.category}</div>
                </div>
            </div>
        `).join('');
    }

    function updateStats() {
        document.getElementById('totalVideos').textContent = allVideos.length;
        const dur = allVideos.reduce((s,v) => s+(v.duration||0), 0);
        document.getElementById('totalDuration').textContent = dur > 3600 ? (dur/3600).toFixed(1)+'小时' : Math.round(dur/60)+'分钟';
        document.getElementById('totalSize').textContent = formatSize(allVideos.reduce((s,v) => s+(v.fileSize||0), 0));
    }

    function filterCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.category-chip').forEach(c => c.classList.toggle('active', c.textContent.includes(cat) || (!cat && c.textContent==='全部')));
        document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
        renderVideos(); showHome();
    }

    function searchVideos() { currentSearch = document.getElementById('searchInput').value.trim(); renderVideos(); showHome(); }
    function showMyVideos() { currentCategory=''; currentSearch=''; document.getElementById('searchInput').value=''; renderVideos(); showHome(); }

    // ==================== 播放 ====================
    async function playVideo(id) {
        const video = allVideos.find(v => v.id === id);
        if (!video) return;
        currentVideoId = id;
        video.views = (video.views||0) + 1;
        await dbPut(video);
        const blob = new Blob([video.data], { type: video.fileType });
        const url = URL.createObjectURL(blob);
        const player = document.getElementById('videoPlayer');
        player.src = url; player.load();
        document.getElementById('playerTitle').textContent = video.title;
        document.getElementById('playerViews').textContent = video.views + ' 次播放';
        document.getElementById('playerDate').textContent = formatDate(video.uploadDate);
        document.getElementById('playerCategory').textContent = getCategoryIcon(video.category) + ' ' + video.category;
        document.getElementById('playerSize').textContent = formatSize(video.fileSize);
        document.getElementById('playerDesc').textContent = video.description || '暂无描述';
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('playerPage').classList.add('show');
        try { await player.play(); } catch(e) {}
        player.onended = () => URL.revokeObjectURL(url);
    }

    function showHome() {
        document.getElementById('playerPage').classList.remove('show');
        document.getElementById('homePage').style.display = 'block';
        const p = document.getElementById('videoPlayer');
        p.pause(); if (p.src) URL.revokeObjectURL(p.src); p.src = '';
        currentVideoId = null;
    }

    async function likeCurrentVideo() {
        if (!currentVideoId) return;
        const v = allVideos.find(v => v.id === currentVideoId);
        if (!v) return;
        v.likes = (v.likes||0) + 1;
        await dbPut(v); showToast('已点赞 👍'); loadVideos();
    }

    function downloadCurrentVideo() {
        if (!currentVideoId) return;
        const v = allVideos.find(v => v.id === currentVideoId);
        if (!v) return;
        const blob = new Blob([v.data], { type: v.fileType });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = v.fileName || 'video.mp4'; a.click();
        URL.revokeObjectURL(url); showToast('开始下载');
    }

    async function deleteCurrentVideo() {
        if (!currentVideoId) return;
        if (!confirm('确定要删除这个视频吗？此操作不可恢复。')) return;
        await dbDelete(currentVideoId); showToast('视频已删除'); showHome(); loadVideos();
    }

    async function clearAllVideos() {
        if (allVideos.length === 0) { showToast('没有视频可删除', 'error'); return; }
        if (!confirm('确定要删除全部 ' + allVideos.length + ' 个视频吗？此操作不可恢复。')) return;
        await dbClear(); showToast('已清空所有视频'); loadVideos();
    }

    // ==================== 初始化 ====================
    async function init() { await openDB(); await loadVideos(); }
    init();
    </script>
</body>
</html>
