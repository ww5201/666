<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频网站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .container {
            background: #1a1a1a; border-radius: 24px; padding: 48px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5); text-align: center;
            max-width: 500px; width: 100%;
        }
        .logo { font-size: 5em; margin-bottom: 16px; }
        h1 { font-size: 2.2em; margin-bottom: 8px; color: #fff; }
        .sub { color: #aaa; margin-bottom: 32px; font-size: 1.1em; }
        .features { display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px; }
        .feature {
            display: flex; align-items: center; gap: 12px;
            padding: 16px 20px; background: #252525; border-radius: 12px;
            text-align: left; color: #ccc; font-size: 14px;
        }
        .feature .icon { font-size: 24px; }
        .enter-btn {
            display: inline-block; padding: 16px 48px;
            background: #fe2c55; color: white; border: none; border-radius: 28px;
            font-size: 18px; font-weight: 700; cursor: pointer;
            text-decoration: none; transition: all 0.2s;
        }
        .enter-btn:hover { background: #e0264c; transform: scale(1.05); }
        .links { margin-top: 24px; display: flex; gap: 12px; justify-content: center; }
        .links a {
            padding: 10px 20px; background: transparent; color: #aaa;
            border: 1px solid #333; border-radius: 20px; text-decoration: none;
            font-size: 13px; transition: all 0.2s;
        }
        .links a:hover { border-color: #fe2c55; color: #fe2c55; }
        .version { margin-top: 24px; color: #555; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎬</div>
        <h1>视频网站</h1>
        <p class="sub">支持真实视频上传与播放</p>
        <div class="features">
            <div class="feature"><span class="icon">📤</span>上传本地视频文件，支持拖拽</div>
            <div class="feature"><span class="icon">▶️</span>在线播放，支持全屏、进度控制</div>
            <div class="feature"><span class="icon">🔍</span>搜索、分类、管理你的视频库</div>
            <div class="feature"><span class="icon">💾</span>视频存储在浏览器本地，无需服务器</div>
        </div>
        <a href="/demo.html" class="enter-btn">进入视频网站</a>
        <div class="links">
            <a href="/demo.html">电脑版</a>
            <a href="/demo-mobile.html">手机版</a>
        </div>
        <div class="version">v2.0 正式版 | 2026-06-13</div>
    </div>
</body>
</html>
